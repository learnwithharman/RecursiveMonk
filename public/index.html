<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recursive Monk UNO</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<div class="container">
  <h1>Recursive Monk UNO</h1>
  <p class="subtitle">Multiplayer card game in your browser</p>

  <!-- Home: create or join -->
  <div id="home-screen">
    <div id="error-box" class="error-msg hidden"></div>

    <div class="card">
      <label for="player-name">Your name</label>
      <input id="player-name" type="text" placeholder="Enter your name" maxlength="20">

      <button class="btn btn-primary" id="btn-create">Create Room</button>
      <p class="divider">— or —</p>
      <label for="room-code-input">Room code</label>
      <input id="room-code-input" type="text" placeholder="ABC123" maxlength="6" style="text-transform:uppercase">
      <button class="btn btn-secondary" id="btn-join">Join Room</button>
    </div>
  </div>

  <!-- Lobby: waiting for players -->
  <div id="lobby-screen" class="hidden">
    <div class="card">
      <p class="waiting-msg">Share this code with friends</p>
      <div class="room-code" id="room-code-display">------</div>

      <ul class="player-list" id="player-list"></ul>
      <p class="waiting-msg" id="player-count">1 / 10 players</p>
      <button class="btn btn-primary hidden" id="btn-start">Start Game</button>
    </div>
    <button class="btn btn-secondary" id="btn-leave">Leave Room</button>
  </div>

  <!-- Game: basic table view -->
  <div id="game-screen" class="hidden">
    <div class="card">
      <p class="waiting-msg">Room <span id="game-room-code"></span></p>
      <div class="table-center">
        <div style="display: flex; gap: 1rem; justify-content: center; align-items: center; margin: 1rem 0;">
          <div>
            <p class="turn-label">Draw Pile</p>
            <div class="uno-card wild" id="draw-pile" style="cursor: pointer; display: flex; align-items: center; justify-content: center;">UNO</div>
          </div>
          <div>
            <p class="turn-label">Discard Pile</p>
            <div class="uno-card" id="top-card">?</div>
          </div>
        </div>
        <p class="turn-label" id="turn-info">Waiting...</p>
      </div>
      <ul class="player-list" id="game-player-list"></ul>
    </div>
    <div class="card">
      <p class="waiting-msg">Your hand</p>
      <div class="hand" id="my-hand"></div>
    </div>
  </div>
</div>

<script src="/socket.io/socket.io.js"></script>
<script src="/js/lobby.js"></script>
</body>
</html>
